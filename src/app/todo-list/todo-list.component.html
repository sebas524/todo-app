<div class="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100">
  <div class="mx-auto max-w-2xl px-4 py-10">
    <!-- Header -->
    <div class="mb-6">
      <h2 class="text-3xl font-bold tracking-tight text-slate-900">
        Todo List
      </h2>
      <p class="mt-2 text-sm text-slate-600">
        Angular 19 + Signals • Keep it simple, keep it moving.
      </p>
    </div>

    <!-- Card -->
    <div
      class="rounded-2xl border border-slate-200 bg-white/80 shadow-sm backdrop-blur"
    >
      <!-- Input row -->
      <div
        class="flex flex-col gap-3 border-b border-slate-200 p-4 sm:flex-row sm:items-center"
      >
        <div class="relative flex-1">
          <input
            type="text"
            name="title"
            placeholder="Add a new todo…"
            required
            #txtTitle
            (keyup.enter)="addTodo(txtTitle.value); txtTitle.value = ''"
            class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 text-slate-900 placeholder:text-slate-400 shadow-sm outline-none transition focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100"
          />
          <div
            class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-slate-400"
          >
            ↵
          </div>
        </div>

        <button
          type="button"
          (click)="addTodo(txtTitle.value); txtTitle.value = ''"
          class="inline-flex items-center justify-center rounded-xl bg-indigo-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-700 active:scale-[0.99] focus:outline-none focus:ring-4 focus:ring-indigo-200"
        >
          Add
        </button>
      </div>

      <!-- List / Empty state -->
      <div class="p-4">
        @if (todos().length === 0) {
        <div
          class="rounded-xl border border-dashed border-slate-200 bg-slate-50 p-6 text-center"
        >
          <p class="text-sm font-medium text-slate-700">No todos yet</p>
          <p class="mt-1 text-sm text-slate-500">
            Add something above and you’re good.
          </p>
        </div>
        } @else {
        <ul class="space-y-2">
          @for (todo of todos(); track todo.id) {
          <app-todo-item
            [todo]="todo"
            (removed)="handleRemove($event)"
            (toggled)="handleToggle($event)"
            (edited)="handleEdit($event)"
          ></app-todo-item>
          }
        </ul>
        }
      </div>
    </div>

    <!-- Footer hint -->
    <p class="mt-4 text-xs text-slate-500">
      Tip: press
      <span class="rounded border bg-white px-1.5 py-0.5">Enter</span> to add
      quickly.
    </p>
  </div>
</div>
