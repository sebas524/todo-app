<li
  class="group flex items-center justify-between gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3 shadow-sm transition hover:border-slate-300 hover:shadow"
  [class.opacity-70]="todo().done"
  [class.border-l-4]="!todo().done"
  [class.border-l-red-400]="!todo().done && todo().priority === 'high'"
  [class.border-l-amber-300]="!todo().done && todo().priority === 'medium'"
  [class.border-l-sky-300]="!todo().done && todo().priority === 'low'"
  [class.hover:bg-red-50]="!todo().done && todo().priority === 'high'"
  [class.hover:bg-amber-50]="!todo().done && todo().priority === 'medium'"
  [class.hover:bg-sky-50]="!todo().done && todo().priority === 'low'"
>
  <label class="flex flex-1 items-center gap-3">
    <input
      type="checkbox"
      class="h-5 w-5 rounded border-slate-300 text-indigo-600 focus:ring-4 focus:ring-indigo-100"
      [checked]="todo().done"
      (change)="onToggle()"
    />

    @if (!isEditing()) {
    <span
      class="text-sm font-medium text-slate-900 transition"
      [class.line-through]="todo().done"
      [class.text-slate-400]="todo().done"
    >
      {{ todo().title }}
    </span>
    } @else {
    <input
      #editInput
      type="text"
      class="w-full rounded-lg border border-slate-200 bg-white px-2 py-1 text-sm text-slate-900 shadow-sm outline-none focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100"
      [value]="draftTitle"
      (input)="draftTitle = editInput.value"
      (keyup.enter)="saveEdit()"
      (keyup.escape)="cancelEdit()"
    />
    }
  </label>

  <div class="flex items-center gap-2">
    <select
      class="rounded-lg border border-slate-200 bg-white px-2 py-2 text-sm text-slate-700 shadow-sm outline-none transition focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 cursor-pointer"
      [value]="todo().priority"
      (change)="onPriorityChange(editPriority.value)"
      [disabled]="isEditing()"
      aria-label="Todo priority"
      title="Priority"
      #editPriority
    >
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>

    <button
      type="button"
      (click)="isEditing() ? saveEdit() : startEdit()"
      class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-4 focus:ring-slate-200 cursor-pointer"
      [attr.aria-label]="isEditing() ? 'Save todo' : 'Edit todo'"
      [attr.title]="isEditing() ? 'Save' : 'Edit'"
    >
      <span class="hidden sm:inline">
        {{ isEditing() ? "Save" : "Edit" }}
      </span>
      <span class="text-base leading-none">{{ isEditing() ? "✓" : "✎" }}</span>
    </button>

    <button
      type="button"
      (click)="onRemove()"
      class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-4 focus:ring-slate-200 cursor-pointer"
      aria-label="Remove todo"
      title="Remove"
    >
      <span class="hidden sm:inline"></span>
      <span class="text-base leading-none">Remove ✕</span>
    </button>
  </div>
</li>
