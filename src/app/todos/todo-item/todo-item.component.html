<li
  class="group flex items-center justify-between gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3 shadow-sm transition hover:border-slate-300 hover:shadow"
  [class.opacity-70]="todo().done"
  [class.border-l-4]="!todo().done"
  [class.border-l-red-400]="!todo().done && todo().priority === 'high'"
  [class.border-l-amber-300]="!todo().done && todo().priority === 'medium'"
  [class.border-l-sky-300]="!todo().done && todo().priority === 'low'"
  [class.hover:bg-red-50]="!todo().done && todo().priority === 'high'"
  [class.hover:bg-amber-50]="!todo().done && todo().priority === 'medium'"
  [class.hover:bg-sky-50]="!todo().done && todo().priority === 'low'"
>
  <label class="flex flex-1 items-center gap-3">
    <input
      type="checkbox"
      class="h-5 w-5 rounded border-slate-300 text-indigo-600 focus:ring-4 focus:ring-indigo-100"
      [class.ring-4]="isPartHighlighted('toggle')"
      [class.ring-indigo-200]="isTone('toggle', 'info')"
      [class.ring-emerald-200]="isTone('toggle', 'success')"
      [class.ring-red-200]="isTone('toggle', 'danger')"
      [checked]="todo().done"
      (change)="onToggle()"
    />

    @if (!isDisplayEditing()) {
    <span
      class="rounded-md px-1.5 py-1 text-sm font-medium text-slate-900 transition"
      [class.line-through]="todo().done"
      [class.text-slate-400]="todo().done"
      [class.ring-2]="isPartHighlighted('title')"
      [class.ring-indigo-400]="isTone('title', 'info')"
      [class.bg-indigo-50]="isTone('title', 'info')"
      [class.ring-emerald-400]="isTone('title', 'success')"
      [class.bg-emerald-50]="isTone('title', 'success')"
      [class.ring-red-400]="isTone('title', 'danger')"
      [class.bg-red-50]="isTone('title', 'danger')"
    >
      {{ todo().title }}
    </span>
    } @else {
    <input
      #editInput
      type="text"
      class="w-full rounded-lg border border-slate-200 bg-white px-2 py-1 text-sm text-slate-900 shadow-sm outline-none focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100"
      [class.ring-2]="agentEditInputHighlighted()"
      [class.ring-indigo-400]="
        agentEditInputHighlighted() && agentEditTone() === 'info'
      "
      [class.bg-indigo-50]="
        agentEditInputHighlighted() && agentEditTone() === 'info'
      "
      [class.ring-emerald-400]="
        agentEditInputHighlighted() && agentEditTone() === 'success'
      "
      [class.bg-emerald-50]="
        agentEditInputHighlighted() && agentEditTone() === 'success'
      "
      [value]="displayDraftTitle()"
      (input)="draftTitle = editInput.value"
      (keyup.enter)="saveEdit()"
      (keyup.escape)="cancelEdit()"
    />
    }
  </label>

  <div class="flex items-center gap-2">
    <select
      class="rounded-lg border border-slate-200 bg-white px-2 py-2 text-sm text-slate-700 shadow-sm outline-none transition focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 cursor-pointer"
      [class.ring-2]="isPartHighlighted('priority')"
      [class.ring-indigo-400]="isTone('priority', 'info')"
      [class.bg-indigo-50]="isTone('priority', 'info')"
      [class.ring-emerald-400]="isTone('priority', 'success')"
      [class.bg-emerald-50]="isTone('priority', 'success')"
      [class.ring-red-400]="isTone('priority', 'danger')"
      [class.bg-red-50]="isTone('priority', 'danger')"
      [value]="todo().priority"
      (change)="onPriorityChange(editPriority.value)"
      [disabled]="isEditing()"
      aria-label="Todo priority"
      title="Priority"
      #editPriority
    >
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>

    <button
      type="button"
      (click)="isEditing() ? saveEdit() : startEdit()"
      class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-4 focus:ring-slate-200 cursor-pointer"
      [class.ring-2]="isPartHighlighted('edit') || agentEditButtonHighlighted()"
      [class.ring-indigo-400]="
        isTone('edit', 'info') ||
        (agentEditButtonHighlighted() && agentEditTone() === 'info')
      "
      [class.bg-indigo-50]="
        isTone('edit', 'info') ||
        (agentEditButtonHighlighted() && agentEditTone() === 'info')
      "
      [class.ring-emerald-400]="
        isTone('edit', 'success') ||
        (agentEditButtonHighlighted() && agentEditTone() === 'success')
      "
      [class.bg-emerald-50]="
        isTone('edit', 'success') ||
        (agentEditButtonHighlighted() && agentEditTone() === 'success')
      "
      [attr.aria-label]="isEditActionActive() ? 'Save todo' : 'Edit todo'"
      [attr.title]="isEditActionActive() ? 'Save' : 'Edit'"
    >
      <span class="hidden sm:inline">
        {{ isEditActionActive() ? "Save" : "Edit" }}
      </span>
      <span class="text-base leading-none">{{
        isEditActionActive() ? "✓" : "✎"
      }}</span>
    </button>

    <button
      type="button"
      (click)="onRemove()"
      class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-4 focus:ring-slate-200 cursor-pointer"
      [class.ring-2]="isPartHighlighted('remove')"
      [class.ring-indigo-400]="isTone('remove', 'info')"
      [class.bg-indigo-50]="isTone('remove', 'info')"
      [class.ring-emerald-400]="isTone('remove', 'success')"
      [class.bg-emerald-50]="isTone('remove', 'success')"
      [class.ring-red-400]="isTone('remove', 'danger')"
      [class.bg-red-50]="isTone('remove', 'danger')"
      aria-label="Remove todo"
      title="Remove"
    >
      <span class="hidden sm:inline"></span>
      <span class="text-base leading-none">Remove ✕</span>
    </button>
  </div>
</li>
